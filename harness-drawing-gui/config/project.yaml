project:
  name: harness-drawing-gui
  objective: >-
    Build a browser-based electrical harness drawing generator that accepts one 2-page PDF template
    and one pinout workbook/CSV, overlays engineering drawing content on top of the template, and exports
    PDF plus vector-friendly outputs.

product_constraints:
  - The template PDF is a fixed drawing canvas and must remain visually recognizable.
  - The UI is for electrical engineers, not casual users.
  - The raw pinout sheet is not previewed as a spreadsheet in the main workspace.
  - Page 2 rendering is geometry-driven from connector pin mappings.
  - Page 1 rendering is overlay-driven for fillable regions and callouts.

inputs:
  template_pdf:
    required: true
    file_count: 1
    pages: 2
    page_size_pt:
      width: 720
      height: 405
  pinout:
    required: true
    accepted_extensions: [.xlsx, .xls, .csv]
    preferred_sheet: Ladder_26pin
    supported_contracts:
      - name: ladder_26pin_minimal
        columns: [P2, Signal Name, AWG, Color, TP, P4]
        mapping:
          fromPin: P2
          toPin: P4
          leftLabel: Signal Name
          rightLabel: Signal Name
          awg: AWG
          color: Color
          pair: TP

ui:
  layout:
    left_rail: true
    large_right_preview: true
    top_status_bar: true
  sections:
    - upload inputs
    - preview controls
    - page 1 fillables
    - page 2 fillables
    - export
    - project save/load
  principles:
    - engineering dense
    - precise typography
    - dark control surfaces
    - bright drawing canvas
    - do not copy prototype exactly

rendering:
  internal_scene_graph: svg
  page1:
    behavior:
      - mask fillable regions when needed
      - re-typeset notes block
      - note 05 gets blue triangle marker
      - note 07 gets blue square highlight
      - support editable callout badges
      - keep title block and revision block overlay editable
  page2:
    behavior:
      - two yellow connector columns act as fixed anchors
      - pins are numbered top to bottom
      - wires terminate at black endpoint dots
      - wire endpoints are derived from fromPin and toPin
      - TP rows draw figure-8 markers at both ends
      - connector columns may auto-expand vertically for wire count
      - optional connector images and tooling blocks render below headings

exports:
  phase_1:
    - pdf
    - svg
    - dxf
    - project-json
  phase_2:
    - ldrdoc

acceptance_criteria:
  - Uploading Template.pdf and Pinout.xlsx must produce a recognizable 2-page drawing preview.
  - Page 2 must render all 26 pins and crossovers from the sample workbook correctly.
  - Blank signal names must not break the overlay.
  - The output must preserve the visual relationship between the template and overlay.
